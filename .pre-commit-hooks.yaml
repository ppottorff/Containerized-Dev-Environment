-   id: git-secrets
    name: Git Secrets
    description: git-secrets scans commits, commit messages, and --no-ff merges to prevent adding secrets into your git repositories.
    entry: 'git-secrets --pre_commit_hook'
    language: script
-   id: checkov
    name: Checkov
    description: This hook runs checkov.
    entry: checkov -d .
    language: python
    pass_filenames: false
    always_run: false
    files: \.tf$
    exclude: \.+.terraform\/.*$
    require_serial: true
